<!DOCTYPE html>
<html><head><meta charset="utf-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
let l=new URLSearchParams(location.search).get('lang');
if(!l&&window.Telegram&&Telegram.WebApp)
  l=(Telegram.WebApp.initDataUnsafe?.user?.language_code||'').slice(0,2);
location.replace((['ru','uk','cs'].includes(l)?l:'ru')+'/'+location.hash);
</script></head><body></body></html>
